<section class="cta">
  <div class="cta__inner">
    <div class="cta__text">
      <h2 class="cta__heading">Come Deeper in Faith.</h2>
      <p class="cta__sub">We'd love to welcome you this Sunday!</p>
    </div>
    <div class="cta__actions">
      <a routerLink="/plan-your-visit" class="btn btn--gold">
        <lucide-icon name="calendar" [size]="18"></lucide-icon>
        Join Us This Sunday
      </a>
      <a routerLink="/sermons" class="btn btn--outline">
        <lucide-icon name="play" [size]="18"></lucide-icon>
        Watch Online
      </a>
    </div>
  </div>
</section>
