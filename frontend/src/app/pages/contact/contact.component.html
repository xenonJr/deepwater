<dw-page-hero
  title="Contact Us"
  subtitle="We'd love to hear from you"
  label="Get in Touch">
</dw-page-hero>

<section class="contact">
  <div class="contact__inner">

    <div class="contact__info">
      <h2>Get in Touch</h2>
      <ul class="contact__list">
        <li>
          <strong>Service Times</strong>
          <p>Sundays at 10:00am</p>
        </li>
        <li>
          <strong>Location</strong>
          <p>121 Orchard Road<br>Doreen VIC 3754</p>
        </li>
        <li>
          <strong>Email</strong>
          <p><a href="mailto:admin.deepwaters@gmail.com">admin.deepwaters&#64;gmail.com</a></p>
        </li>
        <li>
          <strong>Phone</strong>
          <p><a href="tel:0397124411">(03) 9712 4411</a></p>
        </li>
      </ul>
    </div>

    <form class="contact__form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <h3>Send a Message</h3>

      <div class="form-group">
        <label for="name">Your Name *</label>
        <input id="name" type="text" formControlName="name" placeholder="Jane Smith">
        <span class="form-error" *ngIf="f['name'].touched && f['name'].invalid">Name is required.</span>
      </div>

      <div class="form-group">
        <label for="email">Email *</label>
        <input id="email" type="email" formControlName="email" placeholder="jane@example.com">
        <span class="form-error" *ngIf="f['email'].touched && f['email'].invalid">Valid email required.</span>
      </div>

      <div class="form-group">
        <label for="phone">Phone (optional)</label>
        <input id="phone" type="tel" formControlName="phone" placeholder="0400 000 000">
      </div>

      <div class="form-group">
        <label for="message">Message *</label>
        <textarea id="message" formControlName="message" rows="5" placeholder="How can we help you?"></textarea>
        <span class="form-error" *ngIf="f['message'].touched && f['message'].invalid">Message must be at least 10 characters.</span>
      </div>

      <button type="submit" class="btn btn--gold" [disabled]="submitting">
        {{ submitting ? 'Sending...' : 'Send Message →' }}
      </button>
    </form>

  </div>
</section>
