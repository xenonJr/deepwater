<section class="hero">
  <div class="hero__overlay"></div>
  <div class="hero__content">
    <h1 class="hero__title">Deep Waters</h1>
    <div class="hero__divider">
      <span class="hero__divider-line"></span>
      <span class="hero__divider-text">Church</span>
      <span class="hero__divider-line"></span>
    </div>
    <p class="hero__tagline">
      A welcoming Christian church community in Doreen.<br>
      Helping people encounter Jesus, grow in faith, and<br>
      discover the life-giving hope found in God's Word.
    </p>
    <div class="hero__ctas">
      <a routerLink="/plan-your-visit" class="btn btn--gold">
        <lucide-icon name="calendar" [size]="18"></lucide-icon>
        Join Us This Sunday
      </a>
      <a routerLink="/sermons" class="btn btn--dark">
        <lucide-icon name="play" [size]="18"></lucide-icon>
        Watch Online
      </a>
    </div>
  </div>
</section>
